# Render.com Blueprint — https://render.com/docs/blueprint-spec
#
# Apply via the Render dashboard: New + → Blueprint → point at this repo.
# Render will create the service below from the Dockerfile in the repo root.

services:
  - type: web
    name: lovely-labels
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8080"
      - key: MAGICK_BIN
        value: magick
